<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager SPA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="form-column">
      <h2>Создать задачу</h2>
      <form id="task-form">
        <input type="text" id="task-title" placeholder="Название" required>
        <input type="text" id="task-stack" placeholder="Стек (Python, Web, Дизайн)" required>
        <textarea id="task-desc" placeholder="Описание" required></textarea>
        <button type="submit">Создать задачу</button>
      </form>
    </div>
    
    <div class="tasks-column">
      <h2>Задачи</h2>
      <div class="filter-buttons">
        <button data-filter="All">Все</button>
        <button data-filter="Python">Python</button>
        <button data-filter="Web">Web</button>
        <button data-filter="Дизайн">Дизайн</button>
      </div>
      <div id="tasks-list"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
